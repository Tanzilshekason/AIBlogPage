<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links a, .nav-links button {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1rem;
            font-size: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: normal;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-title {
            margin-top: 0;
            color: var(--primary);
        }
        .card-title a { color: inherit; text-decoration: none; }
        .meta { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem; }
        .meta a { color: var(--text-muted); text-decoration: underline; }
        
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.25rem;
            font-family: inherit;
        }
        label { font-weight: 500; }
        
        .pagination { display: flex; justify-content: space-between; margin-top: 2rem; }
        .likes-count { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'post_list' %}">Neosoft Blog</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'profile' user.username %}">Welcome, {{ user.username }}</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
