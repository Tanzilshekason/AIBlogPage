{% extends 'blog/base.html' %}

{% block title %}{% if form.instance.pk %}Edit Post{% else %}New Post{% endif %} - Blog{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if form.instance.pk %}Edit Post{% else %}Create New Post{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn">Save</button>
            <a href="{% if form.instance.pk %}{{ form.instance.get_absolute_url }}{% else %}{% url 'post_list' %}{% endif %}" class="btn" style="background: var(--border);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
